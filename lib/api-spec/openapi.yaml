openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Yudetter SNS API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: yudates
    description: Yudate (post) operations
  - name: users
    description: User operations
  - name: explore
    description: Explore/search operations
  - name: notifications
    description: Notification operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── YUDATES ──────────────────────────────────────────────────────────────
  /yudates:
    get:
      operationId: getTimeline
      tags: [yudates]
      summary: Get home timeline for authenticated user
      parameters:
        - name: cursor
          in: query
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Timeline yudates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/YudatePage"
    post:
      operationId: createYudate
      tags: [yudates]
      summary: Post a new yudate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/YudateInput"
      responses:
        "201":
          description: Created yudate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Yudate"

  /yudates/{id}:
    get:
      operationId: getYudate
      tags: [yudates]
      summary: Get a single yudate by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Yudate detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Yudate"
        "404":
          description: Not found
    delete:
      operationId: deleteYudate
      tags: [yudates]
      summary: Delete a yudate (author only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /yudates/{id}/like:
    post:
      operationId: likeYudate
      tags: [yudates]
      summary: Like a yudate
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Like result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResult"
    delete:
      operationId: unlikeYudate
      tags: [yudates]
      summary: Unlike a yudate
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Unlike result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResult"

  /yudates/{id}/reyudate:
    post:
      operationId: reyudate
      tags: [yudates]
      summary: Reyudate (repost) a yudate
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Reyudate result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResult"
    delete:
      operationId: unReyudate
      tags: [yudates]
      summary: Undo a reyudate
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Un-reyudate result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResult"

  /yudates/{id}/replies:
    get:
      operationId: getYudateReplies
      tags: [yudates]
      summary: Get replies to a yudate
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Replies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/YudatePage"
    post:
      operationId: replyToYudate
      tags: [yudates]
      summary: Reply to a yudate
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReplyInput"
      responses:
        "201":
          description: Reply yudate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Yudate"

  # ── USERS ─────────────────────────────────────────────────────────────────
  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized
    patch:
      operationId: updateMe
      tags: [users]
      summary: Update own profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfileUpdate"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /users/setup:
    post:
      operationId: setupProfile
      tags: [users]
      summary: Complete initial profile setup (username, displayName, birthday)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetupProfileInput"
      responses:
        "200":
          description: Setup complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized
        "409":
          description: Username taken

  /users/setup/check-username:
    get:
      operationId: checkUsername
      tags: [users]
      summary: Check if a username is available
      parameters:
        - name: username
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Availability result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsernameCheckResult"

  /users/sync:
    post:
      operationId: syncUser
      tags: [users]
      summary: Sync Clerk user into DB (JIT provisioning)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserSyncInput"
      responses:
        "200":
          description: Synced user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /users/{username}:
    get:
      operationId: getUserProfile
      tags: [users]
      summary: Get a user profile by username
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "404":
          description: Not found

  /users/{username}/yudates:
    get:
      operationId: getUserYudates
      tags: [users]
      summary: Get yudates by a user
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User yudates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/YudatePage"

  /users/{username}/likes:
    get:
      operationId: getUserLikes
      tags: [users]
      summary: Get yudates liked by a user
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Liked yudates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/YudatePage"


  /users/me/follow-requests:
    get:
      summary: Get pending follow requests
      operationId: getFollowRequests
      tags:
        - Users
      responses:
        "200":
          description: List of users requesting to follow
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserProfile"

  /users/{username}/follow/approve:
    post:
      summary: Approve follow request
      operationId: approveFollowRequest
      tags:
        - Users
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
        "404":
          description: User not found

  /users/{username}/follow/reject:
    post:
      summary: Reject follow request
      operationId: rejectFollowRequest
      tags:
        - Users
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
        "404":
          description: User not found

  /users/{username}/follow:
    post:
      operationId: followUser
      tags: [users]
      summary: Follow a user
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Follow result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResult"
    delete:
      operationId: unfollowUser
      tags: [users]
      summary: Unfollow a user
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Unfollow result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResult"

  /users/{username}/followers:
    get:
      operationId: getFollowers
      tags: [users]
      summary: Get followers of a user
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Followers list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPage"

  /users/{username}/following:
    get:
      operationId: getFollowing
      tags: [users]
      summary: Get users a user is following
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Following list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPage"

  # ── EXPLORE ───────────────────────────────────────────────────────────────
  /explore/popular:
    get:
      operationId: getPopular
      tags: [explore]
      summary: Get popular yudates sorted by engagement
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Popular yudates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/YudatePage"

  /explore:
    get:
      operationId: getExplore
      tags: [explore]
      summary: Get trending and recent yudates for explore page
      parameters:
        - name: cursor
          in: query
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Explore yudates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/YudatePage"

  /explore/search:
    get:
      operationId: search
      tags: [explore]
      summary: Search yudates and users
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
            enum: [yudates, users, all, latest, popular, oldest]
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResults"

  # ── NOTIFICATIONS ─────────────────────────────────────────────────────────
  /notifications:
    get:
      operationId: getNotifications
      tags: [notifications]
      summary: Get notifications for current user
      parameters:
        - name: cursor
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationPage"

  /notifications/read:
    post:
      operationId: markNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      responses:
        "200":
          description: Marked read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResult"

  /notifications/unread-count:
    get:
      operationId: getUnreadNotificationCount
      tags: [notifications]
      summary: Get count of unread notifications
      responses:
        "200":
          description: Unread count
          content:
            application/json:
              schema:
                 $ref: "#/components/schemas/UnreadCount"

  # ── WALLET ───────────────────────────────────────────────────────────────
  /wallet/history:
    get:
      operationId: getWalletHistory
      tags: [wallet]
      summary: Get Yudedollar transaction history
      responses:
        "200":
          description: Wallet transaction list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/YdTransaction"

  # ── MARKET ───────────────────────────────────────────────────────────────
  /market/items:
    get:
      operationId: getMarketItems
      tags: [market]
      summary: Get list of market items
      parameters:
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [image, game, user_id]
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [selling, sold, reserved, completed]
      responses:
        "200":
          description: List of market items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MarketItem"
    post:
      operationId: createMarketItem
      tags: [market]
      summary: Create a new market item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                itemType:
                  type: string
                  enum: [image, audio, game, user_id]
                itemData:
                  type: string
                price:
                  type: integer
                saleType:
                  type: string
                  enum: [normal, auction]
                auctionDurationDays:
                  type: integer
                thumbnailUrl:
                  type: string
                buyoutPrice:
                  type: integer
              required:
                - title
                - itemType
                - itemData
                - price
                - saleType
      responses:
        "201":
          description: Created market item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketItem"

  /market/items/{id}:
    get:
      operationId: getMarketItem
      tags: [market]
      summary: Get a single market item by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Market item detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketItem"

  /market/items/{id}/purchase:
    post:
      operationId: purchaseMarketItem
      tags: [market]
      summary: Buy a market item or place a bid
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                bidAmount:
                  type: integer
      responses:
        "200":
          description: Transaction result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                required:
                  - success

  /market/items/{id}/like:
    post:
      operationId: likeMarketItem
      tags: [market]
      summary: Like a market item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Success
    delete:
      operationId: unlikeMarketItem
      tags: [market]
      summary: Unlike a market item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Success

  /market/items/{id}/comments:
    get:
      operationId: getMarketItemComments
      tags: [market]
      summary: Get comments for a market item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MarketComment"
    post:
      operationId: createMarketItemComment
      tags: [market]
      summary: Add a comment to a market item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                comment:
                  type: string
              required:
                - comment
      responses:
        "201":
          description: Created comment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketComment"

  /market/items/{id}/claim-id:
    post:
      operationId: claimPurchasedId
      tags: [market]
      summary: Apply purchased user ID to own account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Success

  # ── GAMES ────────────────────────────────────────────────────────────────
  /games:
    get:
      operationId: getGames
      tags: [games]
      summary: Get list of YGS games
      responses:
        "200":
          description: List of games
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Game"
    post:
      operationId: createGame
      tags: [games]
      summary: Create and publish a new game
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                htmlContent:
                  type: string
                playPrice:
                  type: integer
              required:
                - title
                - htmlContent
      responses:
        "201":
          description: Created game
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Game"

  /games/{id}:
    get:
      operationId: getGame
      tags: [games]
      summary: Get a single game by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Game detail including HTML content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Game"
    put:
      operationId: updateGame
      tags: [games]
      summary: Update a game by ID
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                htmlContent:
                  type: string
                playPrice:
                  type: integer
              required:
                - title
                - htmlContent
      responses:
        "200":
          description: Game updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Game"

  /games/{id}/charge:
    post:
      operationId: chargeGamePayment
      tags: [games]
      summary: Process in-game YD payment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount:
                  type: integer
                description:
                  type: string
              required:
                - amount
                - description
      responses:
        "200":
          description: Payment transaction ID
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  transactionId:
                    type: integer
                required:
                  - success

  # ── RANKINGS ─────────────────────────────────────────────────────────────
  /rankings:
    get:
      operationId: getRankings
      tags: [rankings]
      summary: Get current rankings
      responses:
        "200":
          description: Ranking lists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rankings"

  /rankings/opt-in:
    post:
      operationId: optInRankings
      tags: [rankings]
      summary: Join the ranking system
      responses:
        "200":
          description: Success

  /rankings/opt-out:
    post:
      operationId: optOutRankings
      tags: [rankings]
      summary: Leave the ranking system
      responses:
        "200":
          description: Success

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ActionResult:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success

    UnreadCount:
      type: object
      properties:
        count:
          type: integer
      required:
        - count

    # ── USER ────────────────────────────────────────────────────────────────
    UserProfile:
      type: object
      properties:
        setupComplete:
          type: boolean
        isPrivate:
          type: boolean
        isBlocking:
          type: boolean
        isBlockedBy:
          type: boolean
        pinnedYudateId:
          type: ["integer", "null"]
        headerUrl:
          type: ["string", "null"]
        birthday:
          type: ["string", "null"]
        id:
          type: integer
        clerkId:
          type: string
        username:
          type: string
        displayName:
          type: string
        email:
          type: string
        bio:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        followerCount:
          type: integer
        followingCount:
          type: integer
        yudateCount:
          type: integer
        isFollowing:
          type: boolean
        isFollowPending:
          type: boolean
        createdAt:
          type: string
          format: date-time
        visibility:
          type: string
          enum: [public, followers]
        isSpoiler:
          type: boolean
        yudedollar:
          type: integer
        badgeType:
          type: ["string", "null"]
        consecutiveLoginDays:
          type: integer
        rankingOptIn:
          type: boolean
      required:
        - id
        - clerkId
        - username
        - displayName
        - email
        - followerCount
        - followingCount
        - yudateCount
        - isFollowing
        - isFollowPending
        - isPrivate
        - isBlocking
        - isBlockedBy
        - setupComplete
        - createdAt
        - yudedollar
        - consecutiveLoginDays
        - rankingOptIn

    UserProfileUpdate:
      type: object
      properties:
        displayName:
          type: string
        bio:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        headerUrl:
          type: ["string", "null"]
        isPrivate:
          type: boolean

    UserSyncInput:
      type: object
      properties:
        clerkId:
          type: string
        username:
          type: string
        displayName:
          type: string
        email:
          type: string
        avatarUrl:
          type: ["string", "null"]
      required:
        - clerkId
        - username
        - displayName
        - email

    UserPage:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/UserProfile"
        nextCursor:
          type: ["integer", "null"]
      required:
        - items

    # ── YUDATE ──────────────────────────────────────────────────────────────
    Yudate:
      type: object
      properties:
        id:
          type: integer
        content:
          type: string
        author:
          $ref: "#/components/schemas/UserProfile"
        likeCount:
          type: integer
